version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Ollama LLM Service with resource limits
  ollama:
    image: ollama/ollama:latest
    container_name: ticket-resolution-ollama-prod
    restart: always
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data_prod:/root/.ollama
    networks:
      - ticket-network-prod
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: serve

  # Backend API Service with resource limits and auto-restart
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ticket-resolution-backend:prod
    container_name: ticket-resolution-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Primary LLM (Groq)
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      
      # Fallback LLM (Ollama)
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama2}
      USE_OLLAMA_FALLBACK: ${USE_OLLAMA_FALLBACK:-true}
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      
      # Production settings
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    networks:
      - ticket-network-prod
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Service with resource limits
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ticket-resolution-frontend:prod
    container_name: ticket-resolution-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://backend:8000}
      NODE_ENV: production
    networks:
      - ticket-network-prod
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics collection
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: ticket-resolution-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   networks:
  #     - ticket-network-prod
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'

networks:
  ticket-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ollama_data_prod:
    driver: local
  # prometheus_data:
  #   driver: local
